<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta</title>
    <link rel="icon" type="image/png" href="../img/favicon.png">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body class="page-body-scroll">
    <div class="card-container card-container-form">
        <div class="card-header">
            <i class="bi bi-person-plus-fill"></i>
            <h1>Criar conta</h1>
            <p>Cadastre seu acesso e preencha seu perfil de uma vez so.</p>
        </div>

        <div class="card-body">
            <form id="formCadastro">
                <label for="nome">Nome completo</label>
                <input type="text" class="form-control" id="nome" placeholder="Seu nome completo" required>

                <label for="email">E-mail</label>
                <input type="email" class="form-control" id="email" placeholder="seu@email.com" required>

                <label for="password">Senha</label>
                <input type="password" class="form-control" id="password" placeholder="Minimo 6 caracteres" required>
                <div id ="dicaSenha" style="font-size:12px; margin-top:-12px; margin-bottom:14px; color:#aaa;">
                    Use pelo menos 6 caracteres, incluindo letras e números.
                </div>

                <label for="telefone">Telefone</label>
                <input type="text" class="form-control" id="telefone" placeholder="(00) 00000-0000" required>

                <div class="pessoas-form-grid">
                    <div>
                        <label for="rua">Rua</label>
                        <input type="text" class="form-control" id="rua" placeholder="Sua rua" required>
                    </div>

                    <div>
                        <label for="numero_da_casa">Numero</label>
                        <input type="text" class="form-control" id="numero_da_casa" placeholder="123" required>
                    </div>
                </div>

                <div class="pessoas-form-grid">
                    <div>
                        <label for="bairro">Bairro</label>
                        <input type="text" class="form-control" id="bairro" placeholder="Seu bairro" required>
                    </div>

                    <div>
                        <label for="cidade">Cidade</label>
                        <input type="text" class="form-control" id="cidade" placeholder="Sua cidade" required>
                    </div>
                </div>

                <label for="complemento">Complemento</label>
                <input type="text" class="form-control" id="complemento" placeholder="Apto, bloco, referencia...">

                <button type="submit" class="btn-primary-custom">
                    <i class="bi bi-check-circle"></i> Criar conta
                </button>

                <div id="mensagem" style="display:none; margin-top: 15px; padding: 10px; border-radius: 8px; text-align: center; font-size: 14px;"></div>

                <div class="separador">ou</div>

                <div class="link-bottom">
                    Ja tem uma conta? <a href="login.html">Faca login</a>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script>
        function mostrarMensagem(texto, tipo) {
            const msg = document.getElementById('mensagem');
            msg.textContent = texto;
            msg.style.display = 'block';
            if (tipo === 'sucesso') {
                msg.style.backgroundColor = '#d4edda';
                msg.style.color = '#155724';
            } else {
                msg.style.backgroundColor = '#f8d7da';
                msg.style.color = '#721c24';
            }
        }

        if (estaLogado()) {
            window.location.href = 'dashboard.html';
        }
        document.getElementById('password').addEventListener('input', function() {
            const senha = this.value;
            const dica = document.getElementById('dicaSenha');
            const temLetra = /[a-zA-Z]/.test(senha);
            const temNumero = /[0-9]/.test(senha);
            const temTamanho = senha.length >= 6;

            if (!temTamanho) {
                dica.textContent = 'A senha precisa ter pelo menos 6 caracteres.';
                dica.style.color = '#e35d4f';
            } else if (!temLetra || !temNumero) {
                dica.textContent = 'A senha precisa ter letras e números.';
                dica.style.color = '#e35d4f';
            } else {
                dica.textContent = 'Senha Valida!';
                dica.style.color = '#2bb3c0';
            }
        });

        document.getElementById('telefone').addEventListener('input', function(){
            const telefone = this.value;
            const msg = document.getElementById('mensagem');
            const regex = /^\(?\d{2}\)?\s?\d{4,5}-?\d{4}$/;

            if (!regex.test(telefone)){
                this.style.borderColor = '#e35d4f';
            } else {
                this.style.borderColor = '#2bb3c0';
            }

        });

        document.getElementById('formCadastro').addEventListener('submit', async (e) => {
            e.preventDefault();


            const msg = document.getElementById('mensagem');
            msg.style.display = 'none';
            msg.textContent = '';

            const dados = {
                nome: document.getElementById('nome').value.trim(),
                email: document.getElementById('email').value.trim(),
                senha: document.getElementById('password').value,
                telefone: document.getElementById('telefone').value.trim(),
                rua: document.getElementById('rua').value.trim(),
                numero_da_casa: document.getElementById('numero_da_casa').value.trim(),
                bairro: document.getElementById('bairro').value.trim(),
                cidade: document.getElementById('cidade').value.trim(),
                complemento: document.getElementById('complemento').value.trim()
            };

            const senha = dados.senha;
            const temLetra = /[a-zA-Z]/.test(senha);
            const temNumero = /[0-9]/.test(senha);

            if (senha.length < 6 || !temLetra || !temNumero) {
                mostrarMensagem('A senha precisa ter pelo menos 6 caracteres com letras e numeros', 'erro');
                  setTimeout(() => {
                    msg.style.display = 'none';
                    msg.textContent = '';
                }, 2000);
                return;
              
            }

            const telefone = dados.telefone;
            const regexTelefone = /^\(?\d{2}\)?\s?\d{4,5}-?\d{4}$/;

            if (!regexTelefone.test(telefone)) {
                mostrarMensagem('Telefone invalido! Use o formato (00) 00000-0000', 'erro');
                setTimeout(() => {
                    msg.style.display = 'none';
                    msg.textContent = '';
                }, 2000);
                return;
            }
            try {
            
                const resultado = await registrar(dados);

                if ((resultado.message || '').toLowerCase().includes('criado com sucesso')) {
                    mostrarMensagem('Conta criada com sucesso! Redirecionando...', 'sucesso');
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 1800);
                } else {
                    mostrarMensagem(resultado.message || resultado.erro || 'Erro ao cadastrar!', 'erro');
                    setTimeout(() => {
                        msg.style.display = 'none';
                        msg.textContent = '';
                    }, 1800);
                }} catch (erro) {
                    console.error(erro);
                    mostrarMensagem('Erro servidor!', 'erro');}
        });
    </script>
</body>
</html>
